<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0c14"/>
      <stop offset="1" stop-color="#12151e"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="#ffffff" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="460" rx="10" fill="url(#bg)"/>
  <rect width="1200" height="460" rx="10" fill="url(#grid)"/>
  <rect x="0.5" y="0.5" width="1199" height="459" rx="10" stroke="#1e2333" fill="none"/>

  <!-- Corner accents -->
  <path d="M 20 36 L 20 20 L 36 20" stroke="#6d5cff" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
  <path d="M 1180 36 L 1180 20 L 1164 20" stroke="#6d5cff" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
  <path d="M 20 424 L 20 440 L 36 440" stroke="#6d5cff" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
  <path d="M 1180 424 L 1180 440 L 1164 440" stroke="#6d5cff" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>

  <!-- ═══════════════ CLI CARD ═══════════════ -->
  <rect x="80" y="40" width="380" height="190" rx="8" fill="#151823" stroke="#1e2333"/>
  <rect x="80" y="40" width="380" height="3" rx="1.5" fill="#6d5cff" opacity="0.5"/>
  <circle cx="104" cy="72" r="4" fill="#6d5cff" opacity="0.8"/>
  <text x="116" y="77" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#e8eaed" letter-spacing="1.5">PYTHON CLI</text>
  <text x="104" y="110" font-family="Consolas, 'Liberation Mono', Menlo, monospace" font-size="11.5" fill="#7d8590">▸  edog.py</text>
  <text x="104" y="135" font-family="Consolas, 'Liberation Mono', Menlo, monospace" font-size="11.5" fill="#7d8590">▸  File Watcher</text>
  <text x="104" y="160" font-family="Consolas, 'Liberation Mono', Menlo, monospace" font-size="11.5" fill="#7d8590">▸  Silent CBA Auth</text>
  <text x="104" y="185" font-family="Consolas, 'Liberation Mono', Menlo, monospace" font-size="11.5" fill="#7d8590">▸  Code Patcher</text>

  <!-- ═══════════════ C# CARD ═══════════════ -->
  <rect x="740" y="40" width="380" height="190" rx="8" fill="#151823" stroke="#1e2333"/>
  <rect x="740" y="40" width="380" height="3" rx="1.5" fill="#22c55e" opacity="0.5"/>
  <circle cx="764" cy="72" r="4" fill="#22c55e" opacity="0.8"/>
  <text x="776" y="77" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#e8eaed" letter-spacing="1.5">C# DEVMODE</text>
  <text x="764" y="96" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#484f5a" letter-spacing="0.5">injected into FLT Service</text>
  <text x="764" y="128" font-family="Consolas, 'Liberation Mono', Menlo, monospace" font-size="11.5" fill="#7d8590">▸  DI Registrar</text>
  <text x="764" y="155" font-family="Consolas, 'Liberation Mono', Menlo, monospace" font-size="11.5" fill="#7d8590">▸  Interceptors</text>
  <text x="764" y="182" font-family="Consolas, 'Liberation Mono', Menlo, monospace" font-size="11.5" fill="#7d8590">▸  SignalR Server</text>

  <!-- ═══════════════ WEB UI CARD ═══════════════ -->
  <rect x="300" y="370" width="600" height="60" rx="8" fill="#151823" stroke="#1e2333"/>
  <rect x="300" y="370" width="600" height="3" rx="1.5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="324" cy="402" r="4" fill="#f59e0b" opacity="0.8"/>
  <text x="336" y="407" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#e8eaed" letter-spacing="1.5">WEB UI</text>
  <text x="416" y="407" font-family="Consolas, 'Liberation Mono', Menlo, monospace" font-size="11" fill="#484f5a">localhost:5555</text>
  <text x="554" y="407" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#3d4350" letter-spacing="0.5">Single HTML · Vanilla JS + CSS · Zero Dependencies</text>

  <!-- ═══════════════ CONNECTIONS ═══════════════ -->

  <!-- CLI → C# DevMode (horizontal) -->
  <line x1="460" y1="130" x2="740" y2="130" stroke="#6d5cff" stroke-width="1.5" opacity="0.35"/>
  <circle cx="460" cy="130" r="3.5" fill="#151823" stroke="#6d5cff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="740" cy="130" r="3.5" fill="#151823" stroke="#6d5cff" stroke-width="1.5" opacity="0.6"/>
  <!-- Label pill -->
  <rect x="563" y="116" width="74" height="22" rx="11" fill="#0d0f17" stroke="#1e2333"/>
  <text x="600" y="131" text-anchor="middle" font-family="Consolas, 'Liberation Mono', monospace" font-size="9.5" fill="#6d5cff" letter-spacing="0.5">inject C#</text>

  <!-- CLI → Web UI (curve) -->
  <path d="M 270 230 C 270 310 440 310 440 370" stroke="#6d5cff" stroke-width="1.5" opacity="0.35" fill="none"/>
  <circle cx="270" cy="230" r="3.5" fill="#151823" stroke="#6d5cff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="440" cy="370" r="3.5" fill="#151823" stroke="#6d5cff" stroke-width="1.5" opacity="0.6"/>
  <!-- Label pill -->
  <rect x="308" y="285" width="52" height="22" rx="11" fill="#0d0f17" stroke="#1e2333"/>
  <text x="334" y="300" text-anchor="middle" font-family="Consolas, 'Liberation Mono', monospace" font-size="9.5" fill="#6d5cff" letter-spacing="0.5">serve</text>

  <!-- C# ↔ Web UI (curve, bidirectional) -->
  <path d="M 930 230 C 930 310 760 310 760 370" stroke="#6d5cff" stroke-width="1.5" opacity="0.35" fill="none"/>
  <circle cx="930" cy="230" r="3.5" fill="#151823" stroke="#6d5cff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="760" cy="370" r="3.5" fill="#151823" stroke="#6d5cff" stroke-width="1.5" opacity="0.6"/>
  <!-- Data flow dots on curve -->
  <circle cx="912" cy="252" r="1.5" fill="#6d5cff" opacity="0.2"/>
  <circle cx="895" cy="272" r="1.5" fill="#6d5cff" opacity="0.3"/>
  <circle cx="870" cy="290" r="1.5" fill="#6d5cff" opacity="0.4"/>
  <circle cx="840" cy="305" r="1.5" fill="#6d5cff" opacity="0.3"/>
  <circle cx="810" cy="320" r="1.5" fill="#6d5cff" opacity="0.2"/>
  <!-- Label pill -->
  <rect x="810" y="270" width="150" height="22" rx="11" fill="#0d0f17" stroke="#1e2333"/>
  <text x="885" y="285" text-anchor="middle" font-family="Consolas, 'Liberation Mono', monospace" font-size="9.5" fill="#6d5cff" letter-spacing="0.5">SignalR + MessagePack</text>
</svg>
