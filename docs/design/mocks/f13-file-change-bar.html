<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDOG Studio — F13 File Change Detection Bar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   EDOG Studio — F13 File Change Detection Notification Bar
   Interactive Mock — Full Page Context
   Philosophy: Warning without anxiety. Action without friction.
   References: VS Code reload bar, JetBrains external changes, Linear banners
   @author Phantom — The Supernatural Designer
   ═══════════════════════════════════════════════════════════════════════════ */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* ── Light Theme ── */
  --bg: #f4f5f7;
  --surface: #ffffff;
  --surface-2: #f8f9fb;
  --surface-3: #ebedf0;
  --border: rgba(0,0,0,0.06);
  --border-bright: rgba(0,0,0,0.12);
  --text: #1a1d23;
  --text-dim: #5a6070;
  --text-muted: #8e95a5;
  --accent: #6d5cff;
  --accent-dim: rgba(109,92,255,0.07);
  --accent-hover: rgba(109,92,255,0.04);
  --accent-glow: rgba(109,92,255,0.15);
  --text-on-accent: #ffffff;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;

  /* Spacing — 4px grid */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;

  /* Sizing */
  --topbar-height: 44px;
  --sidebar-width: 60px;

  /* Transitions */
  --transition-fast: 80ms ease-out;
  --transition-normal: 150ms ease-out;

  /* Elevation */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);

  /* Z-index */
  --z-sidebar: 50;
  --z-topbar: 100;
  --z-toolbar: 90;

  /* Typography */
  --text-xs: 10px;
  --text-sm: 12px;
  --text-md: 13px;
  --text-lg: 15px;

  /* Radius */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 10px;
  --radius-full: 100px;

  /* Semantic colors */
  --level-warning: #e5940c;
  --level-error: #e5453b;
  --status-succeeded: #18a058;
  --status-failed: #e5453b;
  --status-cancelled: #e5940c;
  --status-pending: #8e95a5;

  /* F13 — Amber accent tokens (light) */
  --stale-text: oklch(0.55 0.14 65);
  --stale-badge-bg: rgba(229, 148, 12, 0.10);
  --stale-badge-border: rgba(229, 148, 12, 0.18);
  --stale-dot: #e5940c;
  --success-text: #18a058;
  --success-badge-bg: rgba(24, 160, 88, 0.10);
  --success-badge-border: rgba(24, 160, 88, 0.18);
}

[data-theme="dark"] {
  --bg: #0c0e14;
  --surface: #14171f;
  --surface-2: #1c2029;
  --surface-3: #282d3a;
  --border: rgba(255,255,255,0.06);
  --border-bright: rgba(255,255,255,0.10);
  --text: #e4e7ed;
  --text-dim: #8a91a3;
  --text-muted: #555d70;
  --accent: #8577ff;
  --accent-dim: rgba(133,119,255,0.10);
  --accent-glow: rgba(133,119,255,0.20);
  --text-on-accent: #ffffff;
  --level-warning: #f0b429;
  --level-error: #ff6b6b;
  --status-succeeded: #34d399;
  --status-failed: #ff6b6b;
  --status-cancelled: #f0b429;
  --status-pending: #555d70;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.12);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.18);

  /* F13 — Amber accent tokens (dark) */
  --stale-text: oklch(0.78 0.14 75);
  --stale-badge-bg: rgba(240, 180, 41, 0.12);
  --stale-badge-border: rgba(240, 180, 41, 0.20);
  --stale-dot: #f0b429;
  --success-text: #34d399;
  --success-badge-bg: rgba(52, 211, 153, 0.12);
  --success-badge-border: rgba(52, 211, 153, 0.20);
}

html { height: 100%; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: grid;
  grid-template-rows: var(--topbar-height) auto 1fr;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ═══════════════════════════════════════════════════════════════
   TOPBAR — 44px persistent header
   ═══════════════════════════════════════════════════════════════ */

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--topbar-height);
  padding: 0 var(--space-4);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  z-index: var(--z-topbar);
  font-size: var(--text-sm);
  flex-shrink: 0;
  position: relative;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.topbar-brand {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: var(--text-lg);
  color: var(--accent);
  letter-spacing: 0.06em;
  user-select: none;
}

.brand-icon { color: var(--accent); flex-shrink: 0; }

.brand-studio {
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.14em;
  opacity: 0.85;
  color: var(--text);
}

.tenant-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  background: var(--surface-2);
  border: 1px solid transparent;
  transition: all var(--transition-fast);
}

.tenant-name {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text);
}

.tenant-env {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 1px 6px;
  border-radius: 100px;
}

.service-status {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--text-muted);
  padding: 3px var(--space-2);
  border-radius: var(--radius-full);
  background: var(--surface-2);
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.service-status.running .status-dot { background: var(--status-succeeded); box-shadow: 0 0 6px var(--status-succeeded); }
.service-status.running { color: var(--status-succeeded); }

.topbar-center { flex: 1; display: flex; justify-content: center; }

.topbar-cmdk {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: var(--text-xs);
  color: var(--text-muted);
  opacity: 0.5;
}

.topbar-cmdk kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 1px 5px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text-dim);
}

.topbar-cmdk span { color: var(--text-muted); font-size: 10px; }

.topbar-right {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.topbar-btn {
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: 500;
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.topbar-btn:hover { background: var(--surface-2); color: var(--text); }

.token-health {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  font-weight: 600;
  padding: 3px var(--space-3);
  border-radius: var(--radius-full);
  background: var(--surface-2);
  color: var(--status-succeeded);
}

.topbar-meta {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--text-muted);
  padding: 3px var(--space-2);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
}

/* ═══════════════════════════════════════════════════════════════
   NOTIFICATION ZONE — collapses when empty
   ═══════════════════════════════════════════════════════════════ */

.notification-zone {
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════════════════════════════════════
   F13 — FILE CHANGE DETECTION BAR
   The heart of this mock.
   ═══════════════════════════════════════════════════════════════ */

.file-change-bar {
  display: none;
  align-items: center;
  gap: var(--space-3);
  padding: 7px var(--space-4);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  min-height: 0;
  overflow: hidden;
}

.file-change-bar.active {
  display: flex;
  animation: barSlideDown 0.32s cubic-bezier(0.23, 1, 0.32, 1);
}

.file-change-bar.rebuilding {
  display: flex;
  animation: none;
}

.file-change-bar.success-flash {
  display: flex;
  animation: successPulse 0.4s ease;
}

.file-change-bar.dismissing {
  animation: barSlideUp 0.22s ease forwards;
}

/* ── Stale badge ── */
.stale-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 9px 2px 7px;
  border-radius: var(--radius-full);
  background: var(--stale-badge-bg);
  border: 1px solid var(--stale-badge-border);
  font-size: 11px;
  font-weight: 600;
  color: var(--stale-text);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.01em;
}

.stale-badge .stale-diamond {
  font-size: 9px;
  color: var(--stale-dot);
  animation: diamondPulse 2.4s ease-in-out infinite;
}

/* ── Success badge ── */
.success-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 9px 2px 7px;
  border-radius: var(--radius-full);
  background: var(--success-badge-bg);
  border: 1px solid var(--success-badge-border);
  font-size: 11px;
  font-weight: 600;
  color: var(--success-text);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Rebuilding badge ── */
.rebuilding-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 10px 2px 8px;
  border-radius: var(--radius-full);
  background: var(--accent-dim);
  border: 1px solid rgba(133,119,255,0.15);
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  flex-shrink: 0;
}

.rebuilding-spinner {
  width: 10px;
  height: 10px;
  border: 1.5px solid var(--accent-glow);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* ── File count label ── */
.file-count {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Separator dot ── */
.bar-sep {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--border-bright);
  flex-shrink: 0;
}

/* ── File list (mono, truncated) ── */
.file-list {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
  flex: 1;
}

.file-list .fname {
  color: var(--text-dim);
  transition: color var(--transition-fast);
}

.file-list .fname:hover {
  color: var(--text);
}

.file-list .fcomma {
  color: var(--text-muted);
  opacity: 0.6;
}

.file-list .fellipsis {
  color: var(--text-muted);
  opacity: 0.5;
  font-size: 13px;
  letter-spacing: 1px;
}

/* ── Bar actions ── */
.bar-actions {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-left: auto;
  flex-shrink: 0;
}

.btn-redeploy {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 14px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: var(--text-on-accent);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-normal);
  letter-spacing: 0.01em;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}

.btn-redeploy:hover {
  filter: brightness(1.12);
  transform: translateY(-0.5px);
  box-shadow: 0 2px 8px var(--accent-glow), 0 0 0 2px var(--accent-glow);
}

.btn-redeploy:active {
  transform: translateY(0);
  filter: brightness(0.95);
}

.btn-redeploy .btn-arrow {
  font-size: 10px;
  opacity: 0.7;
  transition: transform 0.15s ease, opacity 0.15s ease;
}

.btn-redeploy:hover .btn-arrow {
  transform: translateX(2px);
  opacity: 1;
}

.btn-dismiss {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition-fast);
  flex-shrink: 0;
}

.btn-dismiss:hover {
  background: var(--surface-3);
  color: var(--text);
}

/* ── Rebuilding message ── */
.rebuilding-msg {
  font-size: 11px;
  color: var(--text-dim);
  flex: 1;
}

.rebuilding-msg .rebuild-step {
  color: var(--accent);
  font-weight: 500;
}

/* ── Success message ── */
.success-msg {
  font-size: 11px;
  color: var(--success-text);
  font-weight: 500;
  flex: 1;
}

/* ═══════════════════════════════════════════════════════════════
   SMART CONTEXT BAR (reference — shown in State 1 as ambient UI)
   ═══════════════════════════════════════════════════════════════ */

.smart-context-bar {
  display: none;
  align-items: center;
  gap: var(--space-3);
  padding: 7px var(--space-4);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  animation: barSlideDown 0.3s ease;
  flex-wrap: wrap;
}

.smart-context-bar.active { display: flex; }

.ctx-type {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--accent-dim);
  color: var(--accent);
  white-space: nowrap;
}

.ctx-name { color: var(--text); font-weight: 600; font-size: 12px; }
.ctx-status { color: var(--status-succeeded); font-weight: 500; font-size: 12px; }
.ctx-meta { color: var(--text-dim); font-size: 11px; font-family: var(--font-mono); }
.ctx-dismiss { color: var(--text-muted); cursor: pointer; margin-left: auto; font-size: 12px; }
.ctx-dismiss:hover { color: var(--text); }

/* ═══════════════════════════════════════════════════════════════
   COCKPIT BODY — Sidebar + Content
   ═══════════════════════════════════════════════════════════════ */

.cockpit-body {
  display: flex;
  overflow: hidden;
  flex: 1;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-width);
  height: 100%;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  padding: var(--space-2) 0;
  gap: 2px;
}

.nav-item {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  margin: 0 var(--space-1);
  border-radius: 8px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all var(--transition-fast);
  position: relative;
}

.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }

.nav-item svg {
  width: 20px;
  height: 20px;
  stroke-width: 1.6;
  fill: none;
  stroke: currentColor;
}

.nav-item .rt-dot {
  position: absolute;
  top: 8px;
  right: 10px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--status-succeeded);
  box-shadow: 0 0 4px var(--status-succeeded);
}

/* ── Content Area ── */
.content-area {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── Toolbar (log filter bar mock) ── */
.logs-toolbar {
  display: flex;
  align-items: center;
  gap: 6px 12px;
  padding: var(--space-2) var(--space-4);
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  z-index: var(--z-toolbar);
  flex-shrink: 0;
}

.search-mock {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 11px;
  font-family: var(--font-body);
  min-width: 180px;
}

.search-mock svg { opacity: 0.5; flex-shrink: 0; }

.level-pills {
  display: flex;
  gap: 4px;
}

.level-pill {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  cursor: default;
}

.level-pill.active { border-color: transparent; }
.level-pill.err { background: rgba(255,107,107,0.10); color: var(--level-error); border-color: rgba(255,107,107,0.15); }
.level-pill.warn { background: rgba(240,180,41,0.10); color: var(--level-warning); border-color: rgba(240,180,41,0.15); }

.toolbar-sep {
  width: 1px;
  height: 16px;
  background: var(--border);
  margin: 0 4px;
}

.toolbar-stat {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

.toolbar-stat b { font-weight: 600; }
.toolbar-stat.err b { color: var(--level-error); }
.toolbar-stat.warn b { color: var(--level-warning); }

/* ── Log rows (ghost content) ── */
.log-viewport {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.log-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 3px var(--space-4);
  font-size: 12px;
  font-family: var(--font-mono);
  border-bottom: 1px solid transparent;
  transition: background var(--transition-fast);
}

.log-row:hover { background: var(--surface-2); }

.log-row:nth-child(even) { background: var(--surface); }
.log-row:nth-child(even):hover { background: var(--surface-2); }

.log-ts {
  color: var(--text-muted);
  font-size: 10px;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 80px;
}

.log-level {
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: var(--radius-full);
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 40px;
  text-align: center;
}

.log-level.info { background: rgba(91,155,255,0.12); color: #5b9bff; }
.log-level.warn { background: rgba(240,180,41,0.12); color: var(--level-warning); }
.log-level.error { background: rgba(255,107,107,0.12); color: var(--level-error); }
.log-level.verbose { background: rgba(85,93,112,0.10); color: var(--status-pending); }

.log-comp {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-dim);
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 90px;
}

.log-msg {
  color: var(--text-dim);
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ═══════════════════════════════════════════════════════════════
   STATE CONTROLLER — Bottom panel
   ═══════════════════════════════════════════════════════════════ */

.state-controller {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 500;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: var(--space-3) var(--space-6);
  display: flex;
  align-items: center;
  gap: var(--space-4);
  box-shadow: 0 -4px 16px rgba(0,0,0,0.12);
}

.state-controller-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
  flex-shrink: 0;
}

.state-buttons {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.state-btn {
  padding: 5px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
}

.state-btn:hover {
  background: var(--surface-3);
  color: var(--text);
  border-color: var(--border-bright);
}

.state-btn.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: var(--accent);
  font-weight: 600;
}

.state-sep {
  width: 1px;
  height: 24px;
  background: var(--border);
  flex-shrink: 0;
}

.theme-toggle {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.theme-toggle label {
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
}

.theme-toggle-btn {
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: 11px;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.theme-toggle-btn:hover { background: var(--surface-3); color: var(--text); }

/* ═══════════════════════════════════════════════════════════════
   KEYFRAME ANIMATIONS
   ═══════════════════════════════════════════════════════════════ */

@keyframes barSlideDown {
  0% { opacity: 0; transform: translateY(-100%); max-height: 0; }
  40% { opacity: 0.6; }
  100% { opacity: 1; transform: translateY(0); max-height: 60px; }
}

@keyframes barSlideUp {
  0% { opacity: 1; transform: translateY(0); max-height: 60px; }
  100% { opacity: 0; transform: translateY(-100%); max-height: 0; padding-top: 0; padding-bottom: 0; }
}

@keyframes diamondPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes successPulse {
  0% { background: var(--success-badge-bg); }
  50% { background: rgba(52, 211, 153, 0.08); }
  100% { background: var(--surface); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

@keyframes rebuildProgress {
  0% { width: 0; }
  100% { width: 100%; }
}

@keyframes checkPop {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes dotFlash {
  0%, 80%, 100% { opacity: 0.3; }
  40% { opacity: 1; }
}

@keyframes shiftGlow {
  0% { box-shadow: inset 0 -1px 0 var(--border); }
  50% { box-shadow: inset 0 -1px 0 rgba(240, 180, 41, 0.25); }
  100% { box-shadow: inset 0 -1px 0 var(--border); }
}

@keyframes pulseRing {
  0% { box-shadow: 0 0 0 0 var(--accent-glow); }
  70% { box-shadow: 0 0 0 6px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}

@keyframes textReveal {
  from { opacity: 0; transform: translateX(-4px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes successCheck {
  0% { stroke-dashoffset: 20; }
  100% { stroke-dashoffset: 0; }
}

/* ── Progress bar inside rebuilding state ── */
.rebuild-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-glow));
  border-radius: 1px;
  animation: rebuildProgress 2.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

/* ── Loading dots ── */
.loading-dots span {
  animation: dotFlash 1.4s infinite both;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

/* ═══════════════════════════════════════════════════════════════
   REDUCED MOTION
   ═══════════════════════════════════════════════════════════════ */

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ═══════════════════════════════════════════════════════════════

::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

<!-- ═══════════════════════════════════════════════════════════════
     STATE CONTROLLER (mock-only UI)
     ═══════════════════════════════════════════════════════════════ -->
<div class="state-controller">
  <span class="state-controller-title">F13 States</span>
  <div class="state-buttons">
    <button class="state-btn active" data-state="0" onclick="setState(0)">1. No Changes</button>
    <button class="state-btn" data-state="1" onclick="setState(1)">2. 1 File</button>
    <button class="state-btn" data-state="2" onclick="setState(2)">3. 5 Files</button>
    <button class="state-btn" data-state="3" onclick="setState(3)">4. Dismissed</button>
    <button class="state-btn" data-state="4" onclick="setState(4)">5. Re-deploy</button>
  </div>
  <div class="state-sep"></div>
  <div class="theme-toggle">
    <label>Theme</label>
    <button class="theme-toggle-btn" onclick="toggleTheme()" id="theme-label">Dark</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   F13 File Change Detection — Interactive Mock Controller
   @author Phantom — EDOG Studio
   ═══════════════════════════════════════════════════════════════════════════ */

(function() {
  'use strict';

  const bar = document.getElementById('file-change-bar');
  const ctx = document.getElementById('smart-context-bar');
  let currentState = 0;
  let animTimeout = null;

  /* ── File scenarios ── */
  const scenarios = {
    one: {
      count: 1,
      files: ['SparkTableController.cs']
    },
    five: {
      count: 5,
      files: ['SparkTableController.cs', 'DagExecutionEngine.cs', 'OneLakeWriter.cs', 'RetryPolicyHandler.cs', 'DataQualityValidator.cs']
    }
  };

  /* ── Render helpers ── */
  function renderFileList(files, maxShow) {
    maxShow = maxShow || 3;
    let html = '';
    const shown = files.slice(0, maxShow);
    shown.forEach(function(f, i) {
      html += '<span class="fname">' + f + '</span>';
      if (i < shown.length - 1) html += '<span class="fcomma">, </span>';
    });
    if (files.length > maxShow) {
      html += '<span class="fcomma">, </span><span class="fellipsis">+' + (files.length - maxShow) + ' more</span>';
    }
    return html;
  }

  function renderStaleBar(scenario) {
    const s = scenarios[scenario];
    bar.className = 'file-change-bar active';
    bar.style.position = 'relative';
    bar.innerHTML =
      '<span class="stale-badge">' +
        '<span class="stale-diamond">&#x25C6;</span>' +
        'Stale' +
      '</span>' +
      '<span class="file-count">' + s.count + ' file' + (s.count > 1 ? 's' : '') + ' changed</span>' +
      '<span class="bar-sep"></span>' +
      '<span class="file-list">' + renderFileList(s.files, 3) + '</span>' +
      '<span class="bar-actions">' +
        '<button class="btn-redeploy" onclick="handleRedeploy()">Re-deploy <span class="btn-arrow">&#x25B8;</span></button>' +
        '<button class="btn-dismiss" onclick="handleDismiss()" title="Dismiss">&#x2715;</button>' +
      '</span>';
  }

  function renderRebuildingBar() {
    bar.className = 'file-change-bar rebuilding';
    bar.style.position = 'relative';
    bar.innerHTML =
      '<span class="rebuilding-badge">' +
        '<span class="rebuilding-spinner"></span>' +
        'Rebuilding' +
      '</span>' +
      '<span class="rebuilding-msg">' +
        'Compiling <span class="rebuild-step">Service/</span>' +
        '<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>' +
      '</span>' +
      '<span class="rebuild-progress"></span>';
  }

  function renderSuccessBar() {
    bar.className = 'file-change-bar success-flash';
    bar.style.position = 'relative';
    bar.innerHTML =
      '<span class="success-badge">' +
        '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="vertical-align: -1px">' +
          '<circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>' +
          '<path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="stroke-dasharray:20;animation:successCheck 0.4s ease forwards"/>' +
        '</svg>' +
        ' Restarted' +
      '</span>' +
      '<span class="success-msg">Service rebuilt and restarted successfully</span>';
  }

  function hideBar(instant) {
    if (instant) {
      bar.className = 'file-change-bar';
      bar.innerHTML = '';
      return;
    }
    bar.classList.add('dismissing');
    setTimeout(function() {
      bar.className = 'file-change-bar';
      bar.innerHTML = '';
    }, 220);
  }

  /* ── State machine ── */
  window.setState = function(state) {
    if (animTimeout) { clearTimeout(animTimeout); animTimeout = null; }
    currentState = state;

    /* Update buttons */
    document.querySelectorAll('.state-btn').forEach(function(btn) {
      btn.classList.toggle('active', parseInt(btn.dataset.state) === state);
    });

    switch (state) {
      case 0: /* No changes */
        hideBar(true);
        ctx.classList.add('active');
        break;

      case 1: /* 1 file changed */
        ctx.classList.add('active');
        renderStaleBar('one');
        break;

      case 2: /* 5 files changed */
        ctx.classList.add('active');
        renderStaleBar('five');
        break;

      case 3: /* Dismissed */
        hideBar(true);
        ctx.classList.add('active');
        /* Show a "Simulate new change" ghost button after a beat */
        setTimeout(function() {
          if (currentState !== 3) return;
          bar.className = 'file-change-bar active';
          bar.style.position = 'relative';
          bar.innerHTML =
            '<span style="' +
              'display:flex;align-items:center;gap:8px;width:100%;justify-content:center;' +
              'padding:2px 0;color:var(--text-muted);font-size:11px;cursor:pointer;' +
              'transition:color 0.15s ease' +
            '" onclick="simulateNewChange()" onmouseover="this.style.color=\'var(--text)\'" onmouseout="this.style.color=\'var(--text-muted)\'">' +
              '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>' +
              'Simulate new file change' +
            '</span>';
        }, 400);
        break;

      case 4: /* Re-deploy flow */
        ctx.classList.add('active');
        renderStaleBar('five');
        /* Auto-trigger redeploy after 600ms to show the cinematic */
        animTimeout = setTimeout(function() {
          if (currentState !== 4) return;
          handleRedeploySequence();
        }, 800);
        break;
    }
  };

  /* ── Interactions ── */
  window.handleDismiss = function() {
    hideBar(false);
    /* After dismiss, allow re-trigger */
    setTimeout(function() {
      if (currentState === 1 || currentState === 2) {
        /* Reset to dismissed state */
        setState(3);
      }
    }, 300);
  };

  window.handleRedeploy = function() {
    handleRedeploySequence();
  };

  function handleRedeploySequence() {
    /* Phase 1: Rebuilding */
    renderRebuildingBar();

    /* Phase 2: Success flash after "build" */
    animTimeout = setTimeout(function() {
      if (bar.className.indexOf('rebuilding') === -1 && currentState !== 4) return;
      renderSuccessBar();

      /* Phase 3: Auto-hide after success */
      animTimeout = setTimeout(function() {
        hideBar(false);
        setTimeout(function() {
          bar.className = 'file-change-bar';
          bar.innerHTML = '';
        }, 250);
      }, 2200);
    }, 3000);
  }

  window.simulateNewChange = function() {
    setState(1);
  };

  /* ── Theme toggle ── */
  window.toggleTheme = function() {
    var html = document.documentElement;
    var isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-label').textContent = isDark ? 'Light' : 'Dark';
  };

  /* ── Generate ghost log rows ── */
  function generateLogs() {
    var viewport = document.getElementById('log-viewport');
    var levels = ['info', 'info', 'info', 'info', 'verbose', 'verbose', 'warn', 'warn', 'error'];
    var levelLabels = { info: 'INF', warn: 'WRN', error: 'ERR', verbose: 'VRB' };
    var components = [
      'Controller', 'DAG', 'OneLake', 'Spark', 'DataQuality', 'RetryPolicy',
      'TokenMgr', 'SignalR', 'FileWatch', 'DevMode'
    ];
    var messages = [
      'Refreshing table metadata from OneLake catalog',
      'Spark session initialized, cluster: contoso-pool-01',
      'DAG node "LoadCustomers" completed in 4.2s',
      'Token refresh scheduled in 23m 14s',
      'OneLake write completed: /Tables/FactSales/part-00042.parquet',
      'Retry attempt 2/3 for GetTableStatus — transient 429',
      'Data quality check passed: FactSales (14,230,891 rows)',
      'SignalR connection established to localhost:5100',
      'Iteration e7a3b1c2 started — 14 nodes queued',
      'Cache miss for schema: contoso.FactSales — fetching from Fabric',
      'Encountered slow query: LoadInventory took 12.4s (threshold: 5s)',
      'ERROR: OneLake access denied for path /Tables/DimProduct',
      'FileSystemWatcher initialized for Service/ directory',
      'DevMode patches applied: 3 files intercepted',
      'Spark job 0042 completed — 847 tasks, 2 stages',
      'Configuration loaded from lakehouse.config.json',
      'Health check passed — all 14 nodes responsive',
      'WARNING: DAG cycle detected in draft topology',
      'Table registration: FactSales v2.4.1 → OneLake',
      'Materialized view refresh: DimDate (delta merge)',
    ];
    var html = '';
    var now = new Date();
    for (var i = 0; i < 40; i++) {
      var t = new Date(now.getTime() - (40 - i) * 2300);
      var ts = String(t.getHours()).padStart(2, '0') + ':' +
               String(t.getMinutes()).padStart(2, '0') + ':' +
               String(t.getSeconds()).padStart(2, '0') + '.' +
               String(t.getMilliseconds()).padStart(3, '0');
      var lvl = levels[Math.floor(Math.random() * levels.length)];
      var comp = components[Math.floor(Math.random() * components.length)];
      var msg = messages[Math.floor(Math.random() * messages.length)];
      html +=
        '<div class="log-row">' +
          '<span class="log-ts">' + ts + '</span>' +
          '<span class="log-level ' + lvl + '">' + levelLabels[lvl] + '</span>' +
          '<span class="log-comp">' + comp + '</span>' +
          '<span class="log-msg">' + msg + '</span>' +
        '</div>';
    }
    viewport.innerHTML = html;
    viewport.scrollTop = viewport.scrollHeight;
  }

  /* ── Boot ── */
  generateLogs();
  setState(0);
})();
</script>
