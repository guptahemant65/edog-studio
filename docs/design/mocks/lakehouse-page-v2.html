<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDOG Studio — Lakehouse Page V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   EDOG Studio — Lakehouse Page V2 — "Holy Shit" Edition
   Designer: Pixel (EDOG Hivemind Frontend Agent)
   ═══════════════════════════════════════════════════════════════════════════
   Advanced CSS: @property, @layer, color-mix(), conic-gradient,
   container queries, :has(), view-transition-name, clip-path
   ═══════════════════════════════════════════════════════════════════════════ */

/* ── @property registrations for animatable custom props ── */
@property --gradient-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}
@property --glow-opacity {
  syntax: '<number>';
  initial-value: 0;
  inherits: false;
}
@property --progress-value {
  syntax: '<number>';
  initial-value: 0;
  inherits: false;
}
@property --hue-rotate {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}
@property --scan-pos {
  syntax: '<percentage>';
  initial-value: 0%;
  inherits: false;
}
@property --ring-progress {
  syntax: '<percentage>';
  initial-value: 0%;
  inherits: false;
}
@property --particle-spread {
  syntax: '<number>';
  initial-value: 0;
  inherits: false;
}
@property --desaturate {
  syntax: '<number>';
  initial-value: 1;
  inherits: false;
}

/* ── Layers ── */
@layer reset, tokens, base, components, animations, utilities;

@layer reset {
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
}

@layer tokens {
  :root {
    /* ── Light Theme ── */
    --bg: #f5f6f8;
    --bg-gradient: linear-gradient(168deg, #f5f6f8 0%, #eef0f5 100%);
    --surface: #ffffff;
    --surface-2: #f8f9fb;
    --surface-3: #eef0f3;
    --surface-glass: rgba(255,255,255,0.72);
    --border: rgba(0,0,0,0.06);
    --border-bright: rgba(0,0,0,0.10);
    --border-glow: rgba(109,92,255,0.20);
    --text: #111318;
    --text-dim: #555d70;
    --text-muted: #8e95a5;
    --accent: #6d5cff;
    --accent-light: #8577ff;
    --accent-dim: rgba(109,92,255,0.06);
    --accent-hover: rgba(109,92,255,0.10);
    --accent-glow: rgba(109,92,255,0.18);
    --accent-gradient: linear-gradient(135deg, #6d5cff 0%, #8b7aff 50%, #a78bfa 100%);
    --green: #18a058;
    --green-light: #22c55e;
    --green-dim: rgba(24,160,88,0.08);
    --green-surface: rgba(24,160,88,0.05);
    --green-glow: rgba(24,160,88,0.25);
    --amber: #e5940c;
    --amber-dim: rgba(229,148,12,0.08);
    --red: #e5453b;
    --red-dim: rgba(229,69,59,0.06);
    --red-surface: rgba(229,69,59,0.04);
    --red-glow: rgba(229,69,59,0.25);
    --text-on-accent: #fff;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
    --radius-xs: 3px;
    --radius-sm: 5px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --radius-pill: 100px;
    --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
    --shadow-elevated: 0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.03);
    --shadow-dramatic: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.04);
    --shadow-glow-accent: 0 0 20px rgba(109,92,255,0.15), 0 0 60px rgba(109,92,255,0.05);
    --shadow-glow-green: 0 0 20px rgba(24,160,88,0.15), 0 0 60px rgba(24,160,88,0.05);
    --transition-fast: 100ms cubic-bezier(0.4,0,0.2,1);
    --transition: 180ms cubic-bezier(0.4,0,0.2,1);
    --transition-spring: 500ms cubic-bezier(0.34,1.56,0.64,1);
    --transition-smooth: 350ms cubic-bezier(0.25,0.46,0.45,0.94);
    --terminal-bg: #0d0f14;
    --terminal-surface: #11131a;
    --terminal-text: #a0a8b8;
    --terminal-dim: #4a5060;
    --terminal-gutter: #2a2e3a;
    --terminal-line-hover: rgba(109,92,255,0.06);
    --card-gradient: linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
    --bar-chart-bg: rgba(0,0,0,0.04);
    --bar-chart-fill-mlv: rgba(109,92,255,0.25);
    --bar-chart-fill-managed: rgba(24,160,88,0.20);
    --bar-chart-fill-external: rgba(229,148,12,0.20);
    --noise-opacity: 0.015;
  }

  [data-theme="dark"] {
    --bg: #08090d;
    --bg-gradient: linear-gradient(168deg, #08090d 0%, #0c0e16 40%, #10121c 100%);
    --surface: #12141c;
    --surface-2: #181b25;
    --surface-3: #1f2330;
    --surface-glass: rgba(18,20,28,0.78);
    --border: rgba(255,255,255,0.05);
    --border-bright: rgba(255,255,255,0.08);
    --border-glow: rgba(133,119,255,0.25);
    --text: #e8eaf0;
    --text-dim: #8a91a3;
    --text-muted: #4f5565;
    --accent: #8577ff;
    --accent-light: #a294ff;
    --accent-dim: rgba(133,119,255,0.08);
    --accent-hover: rgba(133,119,255,0.12);
    --accent-glow: rgba(133,119,255,0.20);
    --accent-gradient: linear-gradient(135deg, #7b6cff 0%, #9d8fff 50%, #b8a4ff 100%);
    --green: #34d399;
    --green-light: #4ade80;
    --green-dim: rgba(52,211,153,0.08);
    --green-surface: rgba(52,211,153,0.04);
    --green-glow: rgba(52,211,153,0.30);
    --amber: #f0b429;
    --amber-dim: rgba(240,180,41,0.08);
    --red: #ff6b6b;
    --red-dim: rgba(255,107,107,0.06);
    --red-surface: rgba(255,107,107,0.04);
    --red-glow: rgba(255,107,107,0.30);
    --shadow-card: 0 1px 4px rgba(0,0,0,0.25), 0 0 1px rgba(0,0,0,0.15);
    --shadow-elevated: 0 4px 16px rgba(0,0,0,0.35), 0 2px 4px rgba(0,0,0,0.15);
    --shadow-dramatic: 0 8px 40px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.20);
    --shadow-glow-accent: 0 0 30px rgba(133,119,255,0.12), 0 0 80px rgba(133,119,255,0.04);
    --shadow-glow-green: 0 0 30px rgba(52,211,153,0.12), 0 0 80px rgba(52,211,153,0.04);
    --terminal-bg: #0a0b10;
    --terminal-surface: #0e1016;
    --terminal-text: #7a8294;
    --terminal-dim: #353a48;
    --terminal-gutter: #1a1e2a;
    --terminal-line-hover: rgba(133,119,255,0.05);
    --card-gradient: linear-gradient(180deg, var(--surface) 0%, color-mix(in srgb, var(--surface) 85%, #000) 100%);
    --bar-chart-bg: rgba(255,255,255,0.03);
    --bar-chart-fill-mlv: rgba(133,119,255,0.30);
    --bar-chart-fill-managed: rgba(52,211,153,0.22);
    --bar-chart-fill-external: rgba(240,180,41,0.22);
    --noise-opacity: 0.025;
  }
}

@layer base {
  html { font-size: 13px; }

  body {
    font-family: var(--font-body);
    background: var(--bg-gradient);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Subtle noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: var(--noise-opacity);
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
}

@layer components {
  /* ═══════════════════════════════════════════════════════
     APP SHELL
     ═══════════════════════════════════════════════════════ */
  .app-shell { display: flex; flex-direction: column; height: 100vh; }

  /* ── Top Bar ── */
  .topbar {
    height: 46px;
    background: var(--surface-glass);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 100;
    position: relative;
  }
  .topbar::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
    opacity: 0.5;
  }

  .topbar-logo {
    font-weight: 800;
    font-size: 13px;
    letter-spacing: -0.03em;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .topbar-sep { width: 1px; height: 18px; background: var(--border-bright); }

  .topbar-breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .topbar-breadcrumb span { color: var(--text-dim); font-weight: 500; }
  .topbar-breadcrumb svg { opacity: 0.35; }

  .topbar-spacer { flex: 1; }
  .topbar-actions { display: flex; align-items: center; gap: 2px; }

  .topbar-btn {
    width: 32px; height: 32px;
    border: none; background: transparent;
    color: var(--text-muted); cursor: pointer;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
    position: relative;
  }
  .topbar-btn:hover { color: var(--text); background: var(--surface-2); }
  .topbar-btn .kbd-hint {
    position: absolute;
    bottom: -22px; left: 50%;
    transform: translateX(-50%) scale(0.9);
    font-size: 9px; font-weight: 600;
    background: var(--surface-3);
    color: var(--text-muted);
    padding: 1px 5px; border-radius: 3px;
    white-space: nowrap; pointer-events: none;
    opacity: 0; transition: all var(--transition-spring);
    border: 1px solid var(--border);
  }
  .topbar-btn:hover .kbd-hint { opacity: 1; transform: translateX(-50%) scale(1); }

  /* ── Sidebar ── */
  .main-area { flex: 1; display: flex; overflow: hidden; }

  .sidebar {
    width: 52px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    flex-shrink: 0;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 12px 0; gap: 2px;
    position: relative;
  }
  .sidebar::after {
    content: '';
    position: absolute;
    right: -1px; top: 0; bottom: 0; width: 1px;
    background: linear-gradient(180deg, var(--accent-glow), transparent 60%);
    opacity: 0.3;
  }

  .sidebar-icon {
    width: 36px; height: 36px;
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); cursor: pointer;
    transition: all var(--transition);
    position: relative;
  }
  .sidebar-icon:hover { color: var(--text); background: var(--surface-2); }
  .sidebar-icon.active {
    color: var(--accent); background: var(--accent-dim);
  }
  .sidebar-icon.active::before {
    content: '';
    position: absolute; left: -8px;
    width: 3px; height: 20px;
    border-radius: 0 2px 2px 0;
    background: var(--accent);
  }

  .sidebar-tooltip {
    position: absolute; left: 48px; top: 50%; transform: translateY(-50%) scale(0.92);
    background: var(--text); color: var(--bg);
    font-size: 11px; font-weight: 500;
    padding: 4px 10px; border-radius: var(--radius-sm);
    white-space: nowrap; pointer-events: none;
    opacity: 0; transition: all var(--transition-spring);
    z-index: 200;
  }
  .sidebar-icon:hover .sidebar-tooltip {
    opacity: 1; transform: translateY(-50%) scale(1);
  }

  /* ── Page content ── */
  .page-content { flex: 1; overflow-y: auto; overflow-x: hidden; }

  .page-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 36px 100px;
  }

  /* ═══════════════════════════════════════════════════════
     HEADER — The Identity
     ═══════════════════════════════════════════════════════ */
  .lh-header {
    display: flex;
    align-items: flex-start;
    gap: 18px;
    margin-bottom: 24px;
    view-transition-name: lh-header;
  }

  .lh-header-icon {
    width: 48px; height: 48px;
    border-radius: var(--radius-lg);
    background: var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--accent);
    margin-top: 2px;
    position: relative;
    transition: all var(--transition);
    border: 1px solid color-mix(in srgb, var(--accent) 15%, transparent);
  }
  .lh-header-icon::after {
    content: '';
    position: absolute; inset: -3px;
    border-radius: calc(var(--radius-lg) + 3px);
    background: conic-gradient(from var(--gradient-angle), transparent 0%, var(--accent-glow) 25%, transparent 50%);
    animation: icon-ring-spin 6s linear infinite;
    opacity: 0;
    z-index: -1;
    transition: opacity var(--transition-smooth);
  }
  .lh-header-icon:hover::after { opacity: 1; }

  @keyframes icon-ring-spin { to { --gradient-angle: 360deg; } }

  .lh-header-info { flex: 1; min-width: 0; }

  .lh-name-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .lh-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.15;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    view-transition-name: lh-name;
  }

  /* ── Status Pill ── */
  .lh-status-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px 4px 9px;
    border-radius: var(--radius-pill);
    line-height: 1;
    white-space: nowrap;
    transition: all var(--transition-smooth);
    view-transition-name: status-pill;
  }
  .lh-status-pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }

  /* Running — breathing glow */
  .lh-status-pill.running {
    background: var(--green-dim); color: var(--green);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--green) 15%, transparent);
  }
  .lh-status-pill.running .dot {
    background: var(--green);
    box-shadow: 0 0 6px var(--green-glow);
    animation: breathing-glow 2.5s ease-in-out infinite;
  }
  .lh-status-pill.running .dot::after {
    content: '';
    position: absolute; inset: -3px;
    border-radius: 50%;
    background: var(--green);
    opacity: 0;
    animation: breathing-ring 2.5s ease-in-out infinite;
  }
  @keyframes breathing-glow {
    0%, 100% { box-shadow: 0 0 4px var(--green-glow); opacity: 1; }
    50% { box-shadow: 0 0 12px var(--green-glow), 0 0 24px color-mix(in srgb, var(--green) 8%, transparent); opacity: 0.7; }
  }
  @keyframes breathing-ring {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.8); opacity: 0; }
  }

  .lh-status-pill.stopped {
    background: var(--surface-3); color: var(--text-muted);
    box-shadow: inset 0 0 0 1px var(--border);
  }
  .lh-status-pill.stopped .dot { background: var(--text-muted); }

  .lh-status-pill.deploying {
    background: var(--accent-dim); color: var(--accent);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 15%, transparent);
  }
  .lh-status-pill.deploying .dot {
    background: var(--accent);
    animation: deploying-pulse 1.2s ease-in-out infinite;
  }
  @keyframes deploying-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .lh-status-pill.failed {
    background: var(--red-dim); color: var(--red);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--red) 15%, transparent);
  }
  .lh-status-pill.failed .dot { background: var(--red); }

  .lh-status-pill.hidden-pill { opacity: 0; width: 0; padding: 0; overflow: hidden; }

  /* ── Meta Row ── */
  .lh-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  /* GUID — scanner hover effect */
  .lh-guid {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 3px 8px;
    border-radius: var(--radius-sm);
    transition: all var(--transition);
    position: relative;
    user-select: none;
    letter-spacing: 0.02em;
    border: 1px solid transparent;
    overflow: hidden;
  }
  .lh-guid:hover {
    background: var(--surface-3);
    color: var(--text-dim);
    border-color: var(--border);
  }
  /* Scanner sweep on hover */
  .lh-guid::before {
    content: '';
    position: absolute; top: 0; bottom: 0;
    width: 30px; left: -30px;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
    transition: none;
    pointer-events: none;
  }
  .lh-guid:hover::before {
    animation: guid-scan 1s ease-in-out;
  }
  @keyframes guid-scan {
    0% { left: -30px; }
    100% { left: 110%; }
  }

  .lh-guid .tooltip {
    position: absolute;
    top: -32px; left: 50%;
    transform: translateX(-50%) translateY(4px) scale(0.95);
    font-family: var(--font-body);
    font-size: 10px; font-weight: 500;
    color: var(--text-on-accent);
    background: var(--text);
    padding: 3px 10px;
    border-radius: var(--radius-sm);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: all var(--transition-spring);
    z-index: 10;
  }
  .lh-guid .tooltip::after {
    content: '';
    position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: var(--text);
  }
  .lh-guid:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  .lh-guid.copied { color: var(--green); border-color: color-mix(in srgb, var(--green) 20%, transparent); background: var(--green-dim); }
  .lh-guid.copied .tooltip { background: var(--green); }
  .lh-guid.copied .tooltip::after { border-top-color: var(--green); }

  .lh-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 9px;
    border-radius: var(--radius-pill);
    line-height: 1.2;
    transition: all var(--transition);
    cursor: default;
    border: 1px solid transparent;
  }
  .lh-badge.env { background: var(--amber-dim); color: var(--amber); border-color: color-mix(in srgb, var(--amber) 12%, transparent); }
  .lh-badge.region { background: var(--surface-3); color: var(--text-muted); border-color: var(--border); }
  .lh-badge:hover { transform: translateY(-1px); }

  .lh-modified { font-size: 11px; color: var(--text-muted); }

  /* ── Port badge with typewriter effect ── */
  .port-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--green);
    background: var(--green-dim);
    padding: 2px 8px;
    border-radius: var(--radius-sm);
    letter-spacing: 0.03em;
    border: 1px solid color-mix(in srgb, var(--green) 12%, transparent);
  }
  .port-badge.typing .port-chars {
    display: inline;
    border-right: 2px solid var(--green);
    animation: blink-cursor 0.8s step-end infinite;
  }
  @keyframes blink-cursor { 50% { border-color: transparent; } }

  /* ═══════════════════════════════════════════════════════
     ACTIONS BAR
     ═══════════════════════════════════════════════════════ */
  .lh-actions {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 24px; flex-wrap: wrap;
    view-transition-name: actions-bar;
  }
  .lh-actions-left { display: flex; align-items: center; gap: 8px; }
  .lh-actions-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--font-body);
    font-size: 12px; font-weight: 600;
    padding: 8px 16px;
    border-radius: var(--radius-md);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap; line-height: 1;
    position: relative;
    overflow: hidden;
  }
  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* Magnetic hover effect */
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.12) 0%, transparent 60%);
    opacity: 0;
    transition: opacity var(--transition);
    pointer-events: none;
  }
  .btn:hover::before { opacity: 1; }

  .btn-primary {
    background: var(--accent-gradient);
    color: var(--text-on-accent);
    box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 25%, transparent), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px color-mix(in srgb, var(--accent) 35%, transparent), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .btn-primary:active { transform: translateY(0) scale(0.98); }

  .btn-danger-outline {
    background: transparent; color: var(--red);
    border-color: color-mix(in srgb, var(--red) 30%, transparent);
  }
  .btn-danger-outline:hover {
    background: var(--red-dim);
    border-color: var(--red);
    box-shadow: 0 0 16px var(--red-glow);
    transform: translateY(-1px);
  }

  .btn-ghost {
    background: transparent; color: var(--text-dim);
    border-color: var(--border-bright);
  }
  .btn-ghost:hover {
    background: var(--surface-2);
    color: var(--text);
    border-color: var(--border-bright);
    transform: translateY(-1px);
  }
  /* Keyboard shortcut hint on hover */
  .btn .btn-kbd {
    font-size: 9px; font-weight: 600;
    background: rgba(255,255,255,0.15);
    padding: 1px 4px; border-radius: 3px;
    margin-left: 2px;
    opacity: 0;
    transform: translateX(-4px);
    transition: all var(--transition-spring);
  }
  .btn:hover .btn-kbd { opacity: 1; transform: translateX(0); }

  /* Deploying button */
  .btn-deploying {
    background: var(--accent-dim); color: var(--accent);
    border-color: color-mix(in srgb, var(--accent) 25%, transparent);
    cursor: default; pointer-events: none;
  }
  .btn-deploying .spinner {
    width: 13px; height: 13px;
    border: 2px solid color-mix(in srgb, var(--accent) 25%, transparent);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══════════════════════════════════════════════════════
     DEPLOY MODULE — THE CINEMATIC EXPERIENCE
     ═══════════════════════════════════════════════════════ */
  .deploy-module {
    margin-bottom: 24px;
    overflow: hidden;
    view-transition-name: deploy-module;
  }

  /* ── Deployed summary — glass card ── */
  .deploy-summary {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: var(--green-surface);
    border: 1px solid color-mix(in srgb, var(--green) 12%, transparent);
    border-radius: var(--radius-lg);
    font-size: 12px; cursor: pointer;
    transition: all var(--transition);
    position: relative;
    overflow: hidden;
  }
  .deploy-summary::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, color-mix(in srgb, var(--green) 3%, transparent) 50%, transparent 100%);
    pointer-events: none;
  }
  .deploy-summary:hover {
    background: var(--green-dim);
    box-shadow: var(--shadow-glow-green);
    transform: translateY(-1px);
  }
  .deploy-summary .check-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--green);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 12px var(--green-glow);
    position: relative;
  }
  .deploy-summary .check-icon svg { animation: check-draw 0.5s ease-out forwards; }
  @keyframes check-draw {
    0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; }
  }

  .deploy-summary .summary-text { flex: 1; color: var(--text-dim); }
  .deploy-summary .summary-text strong { color: var(--green); font-weight: 600; }
  .deploy-summary .expand-hint {
    font-size: 10px; color: var(--text-muted);
    display: flex; align-items: center; gap: 4px;
  }

  /* ── Deploy Progress — Cinematic stepper ── */
  .deploy-cinema {
    background: var(--card-gradient);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 24px 18px;
    box-shadow: var(--shadow-elevated);
    position: relative;
    overflow: hidden;
  }
  /* Subtle top-edge accent glow */
  .deploy-cinema::before {
    content: '';
    position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
  }

  .deploy-cinema-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .deploy-cinema-title {
    font-size: 13px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .deploy-cinema-title .pulse-ring {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    animation: ring-pulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent-glow);
  }
  @keyframes ring-pulse {
    0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 40%, transparent); }
    50% { box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 0%, transparent); }
  }

  .deploy-timer {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 12px;
  }
  .deploy-cancel {
    font-size: 11px; font-weight: 600;
    color: var(--text-muted); background: none;
    border: none; cursor: pointer;
    padding: 3px 10px; border-radius: var(--radius-sm);
    transition: all var(--transition);
    font-family: var(--font-body);
  }
  .deploy-cancel:hover { color: var(--red); background: var(--red-dim); }

  /* ── Conic gradient ring progress ── */
  .deploy-ring-container {
    display: flex; align-items: center; gap: 24px;
    margin-bottom: 18px;
  }
  .deploy-ring {
    width: 64px; height: 64px;
    position: relative; flex-shrink: 0;
  }
  .deploy-ring svg {
    width: 64px; height: 64px;
    transform: rotate(-90deg);
  }
  .deploy-ring .ring-bg {
    fill: none;
    stroke: var(--surface-3);
    stroke-width: 4;
  }
  .deploy-ring .ring-fill {
    fill: none;
    stroke: url(#ring-gradient);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 175.93;
    stroke-dashoffset: 175.93;
    transition: stroke-dashoffset 600ms cubic-bezier(0.4,0,0.2,1);
    filter: drop-shadow(0 0 4px var(--accent-glow));
  }
  .deploy-ring .ring-pct {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 14px; font-weight: 600;
    color: var(--accent);
  }

  /* ── Step icons — each with unique micro-animation ── */
  .deploy-steps {
    flex: 1;
    display: flex; gap: 0;
    align-items: flex-start;
  }
  .deploy-step {
    display: flex; flex-direction: column; align-items: center;
    flex: 1; min-width: 0;
    position: relative;
  }
  .deploy-step .step-icon-wrap {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--border-bright);
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    transition: all 300ms cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    z-index: 1;
  }
  .deploy-step .step-icon-wrap svg {
    width: 16px; height: 16px;
    color: var(--text-muted);
    transition: all var(--transition);
  }
  .deploy-step .step-label {
    font-size: 10px; font-weight: 500;
    color: var(--text-muted);
    margin-top: 6px;
    text-align: center;
    letter-spacing: 0.02em;
    transition: all var(--transition);
  }
  .deploy-step .step-connector {
    position: absolute;
    top: 18px; left: calc(50% + 20px);
    right: calc(-50% + 20px);
    height: 2px;
    background: var(--border-bright);
    z-index: 0;
    transition: background 300ms ease;
  }
  .deploy-step:last-child .step-connector { display: none; }

  /* Step states */
  .deploy-step.done .step-icon-wrap {
    border-color: var(--green);
    background: var(--green);
    box-shadow: 0 0 12px var(--green-glow);
  }
  .deploy-step.done .step-icon-wrap svg { color: #fff; }
  .deploy-step.done .step-label { color: var(--green); }
  .deploy-step.done .step-connector { background: var(--green); }

  .deploy-step.active .step-icon-wrap {
    border-color: var(--accent);
    background: var(--accent-dim);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 12%, transparent);
    animation: step-glow 1.6s ease-in-out infinite;
  }
  .deploy-step.active .step-icon-wrap svg {
    color: var(--accent);
    animation: step-icon-active 1s ease-in-out infinite;
  }
  .deploy-step.active .step-label { color: var(--accent); font-weight: 600; }

  @keyframes step-glow {
    0%, 100% { box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 12%, transparent); }
    50% { box-shadow: 0 0 0 8px color-mix(in srgb, var(--accent) 0%, transparent); }
  }
  @keyframes step-icon-active {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .deploy-step.failed .step-icon-wrap {
    border-color: var(--red);
    background: var(--red);
    box-shadow: 0 0 12px var(--red-glow);
  }
  .deploy-step.failed .step-icon-wrap svg { color: #fff; }
  .deploy-step.failed .step-label { color: var(--red); font-weight: 600; }

  /* ── Terminal — best-in-class ── */
  .deploy-terminal-toggle {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text-muted);
    background: none; border: none; cursor: pointer;
    padding: 4px 0; margin-top: 8px;
    font-family: var(--font-body);
    transition: color var(--transition);
  }
  .deploy-terminal-toggle:hover { color: var(--text-dim); }
  .deploy-terminal-toggle .chevron {
    transition: transform var(--transition-spring);
    font-size: 10px;
    display: inline-block;
  }
  .deploy-terminal-toggle.open .chevron { transform: rotate(90deg); }

  .terminal-window {
    background: var(--terminal-bg);
    border-radius: var(--radius-lg);
    max-height: 0;
    overflow: hidden;
    transition: max-height 300ms cubic-bezier(0.4,0,0.2,1), margin 300ms, padding 200ms;
    margin-top: 0;
    position: relative;
    border: 1px solid transparent;
  }
  .terminal-window.open {
    max-height: 280px;
    overflow-y: auto;
    margin-top: 10px;
    border-color: rgba(255,255,255,0.04);
  }

  /* CRT scanline effect */
  .terminal-window::before {
    content: '';
    position: sticky;
    top: 0; left: 0; right: 0;
    height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 2;
    position: absolute;
    inset: 0;
  }

  /* Terminal header bar */
  .terminal-titlebar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: var(--terminal-surface);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    position: sticky; top: 0; z-index: 3;
  }
  .terminal-dot { width: 8px; height: 8px; border-radius: 50%; }
  .terminal-dot.r { background: #ff5f57; }
  .terminal-dot.y { background: #febc2e; }
  .terminal-dot.g { background: #28c840; }
  .terminal-title {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 10px; color: var(--terminal-dim);
    text-align: center;
  }

  .terminal-body {
    padding: 6px 0;
    font-family: var(--font-mono);
    font-size: 11.5px;
    line-height: 1.65;
    position: relative;
    z-index: 1;
  }

  .term-line {
    display: flex;
    padding: 0 14px 0 0;
    cursor: pointer;
    transition: background var(--transition-fast);
    position: relative;
  }
  .term-line:hover { background: var(--terminal-line-hover); }
  .term-line:hover::after {
    content: 'Copy';
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-body);
    font-size: 9px; font-weight: 500;
    background: var(--terminal-gutter);
    color: var(--terminal-text);
    padding: 1px 6px; border-radius: 3px;
  }
  .term-line.copied::after { content: 'Copied'; color: var(--green); }

  .term-gutter {
    width: 42px;
    text-align: right;
    padding-right: 12px;
    color: var(--terminal-dim);
    user-select: none;
    flex-shrink: 0;
    font-size: 10px;
    opacity: 0.5;
  }
  .term-content { color: var(--terminal-text); white-space: pre-wrap; word-break: break-all; flex: 1; }
  .term-ts { color: var(--terminal-dim); margin-right: 8px; }
  .term-line.warn .term-content { color: #f0b429; }
  .term-line.error .term-content { color: #ff6b6b; }
  .term-line.success .term-content { color: #34d399; }
  .term-line.dim .term-content { color: var(--terminal-dim); }

  /* ── Error banner — dramatic ── */
  .deploy-error-banner {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 16px 20px;
    background: var(--red-surface);
    border: 1px solid color-mix(in srgb, var(--red) 15%, transparent);
    border-radius: var(--radius-lg);
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
    animation: error-shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97) both;
  }
  .deploy-error-banner::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    animation: error-sweep 2s ease-in-out infinite;
  }
  @keyframes error-shake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(1px); }
    30%, 50%, 70% { transform: translateX(-2px); }
    40%, 60% { transform: translateX(2px); }
    100% { transform: translateX(0); }
  }
  @keyframes error-sweep {
    0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; }
  }

  .deploy-error-icon-wrap {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--red);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 12px var(--red-glow);
    animation: error-icon-pulse 2s ease-in-out infinite;
  }
  @keyframes error-icon-pulse {
    0%, 100% { box-shadow: 0 0 8px var(--red-glow); }
    50% { box-shadow: 0 0 20px var(--red-glow); }
  }

  .deploy-error-content { flex: 1; min-width: 0; }
  .deploy-error-title { font-size: 13px; font-weight: 600; color: var(--red); margin-bottom: 3px; }
  .deploy-error-detail {
    font-size: 11.5px; color: var(--text-dim); line-height: 1.5;
    font-family: var(--font-mono);
  }
  .deploy-error-actions { display: flex; gap: 8px; margin-top: 10px; }

  .btn-retry {
    font-size: 11px; font-weight: 600; padding: 6px 14px;
    border-radius: var(--radius-md);
    border: none;
    background: var(--red); color: #fff;
    cursor: pointer; font-family: var(--font-body);
    transition: all var(--transition);
    box-shadow: 0 2px 8px var(--red-glow);
  }
  .btn-retry:hover { transform: translateY(-1px); box-shadow: 0 4px 16px var(--red-glow); }

  .btn-view-logs {
    font-size: 11px; font-weight: 600; padding: 6px 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-bright);
    background: var(--surface); color: var(--text-dim);
    cursor: pointer; font-family: var(--font-body);
    transition: all var(--transition);
  }
  .btn-view-logs:hover { background: var(--surface-2); }

  /* ── Completion Burst ── */
  .completion-burst {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 9998;
  }
  .burst-particle {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    animation: burst-fly 1.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
  }
  @keyframes burst-fly {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  /* ═══════════════════════════════════════════════════════
     TABLES — BEST IN CLASS
     ═══════════════════════════════════════════════════════ */
  .tables-section { margin-top: 4px; }

  .tables-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }

  .tables-title {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 8px;
  }
  .tables-title::after {
    content: '';
    width: 40px; height: 1px;
    background: linear-gradient(90deg, var(--border-bright), transparent);
  }

  .tables-count {
    font-size: 10px; font-weight: 600;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 2px 8px;
    border-radius: var(--radius-pill);
    border: 1px solid color-mix(in srgb, var(--accent) 10%, transparent);
  }

  .tables-filter { display: flex; align-items: center; gap: 8px; }

  .tables-search {
    font-family: var(--font-body);
    font-size: 12px;
    padding: 6px 12px 6px 30px;
    border: 1px solid var(--border-bright);
    border-radius: var(--radius-md);
    background: var(--surface);
    color: var(--text);
    width: 200px; outline: none;
    transition: all var(--transition);
    background-image: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238e95a5' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cline x1='21' y1='21' x2='16.65' y2='16.65'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: 10px center;
  }
  .tables-search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim), var(--shadow-glow-accent);
  }
  [data-theme="dark"] .tables-search {
    background-image: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%234f5565' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cline x1='21' y1='21' x2='16.65' y2='16.65'/%3E%3C/svg%3E");
  }

  .tables-card {
    background: var(--card-gradient);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-card);
    transition: box-shadow var(--transition-smooth);
  }
  .tables-card:hover { box-shadow: var(--shadow-elevated); }

  .tables-grid {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .tables-grid th {
    text-align: left;
    padding: 10px 16px;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
    white-space: nowrap; user-select: none; cursor: pointer;
    transition: color var(--transition);
    position: relative;
  }
  .tables-grid th:hover { color: var(--text-dim); }
  .tables-grid th.num { text-align: right; }
  .tables-grid th .sort-arrow {
    margin-left: 4px; opacity: 0.3; font-size: 8px;
    transition: opacity var(--transition);
  }
  .tables-grid th:hover .sort-arrow { opacity: 0.6; }
  .tables-grid th.sorted .sort-arrow { opacity: 1; color: var(--accent); }

  .tables-grid td {
    padding: 0 16px;
    height: 44px;
    border-bottom: 1px solid var(--border);
    transition: all var(--transition);
    white-space: nowrap;
    vertical-align: middle;
  }
  .tables-grid td.num {
    text-align: right;
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--text-dim);
  }
  .tables-grid tbody tr {
    transition: all var(--transition); cursor: pointer;
  }
  /* Tactile hover — lift + glow */
  .tables-grid tbody tr:hover {
    background: var(--surface-2);
    box-shadow: inset 3px 0 0 var(--accent);
  }
  .tables-grid tbody tr:hover td { color: var(--text); }
  .tables-grid tbody tr:last-child td { border-bottom: none; }

  /* Staggered entrance */
  .tables-grid tbody tr {
    animation: row-enter 0.4s cubic-bezier(0.25,0.46,0.45,0.94) both;
  }
  .tables-grid tbody tr:nth-child(1) { animation-delay: 0.05s; }
  .tables-grid tbody tr:nth-child(2) { animation-delay: 0.10s; }
  .tables-grid tbody tr:nth-child(3) { animation-delay: 0.15s; }
  .tables-grid tbody tr:nth-child(4) { animation-delay: 0.20s; }

function fmtSize(s) { return s.sizeUnit === 'GB' ? s.size.toFixed(1) + ' GB' : Math.round(s.size) + ' MB'; }
function typeLabel(t) { return t === 'mlv' ? 'MLV' : t === 'managed' ? 'Managed' : 'External'; }
function typeChar(t) { return t === 'mlv' ? 'M' : t === 'managed' ? 'T' : 'E'; }

function renderTables() {
  const tbody = document.getElementById('tables-body');
  tbody.innerHTML = tableData.map((t, i) => {
    const pct = Math.round((sizeToMB(t) / maxSizeBytes) * 100);
    return `<tr style="animation-delay:${0.05 + i * 0.05}s">
      <td><span class="table-name"><span class="table-icon ${t.type}">${typeChar(t.type)}</span> ${t.name}</span></td>
      <td><span class="type-badge ${t.type}">${typeLabel(t.type)}</span></td>
      <td class="table-format">${t.format}</td>
      <td class="num">${fmtRows(t.rows)}</td>
      <td class="num"><div class="size-cell"><span class="size-bar"><span class="size-bar-fill ${t.type}" style="width:${pct}%"></span></span>${fmtSize(t)}</div></td>
    </tr>`;
  }).join('');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderTerm(lines, startNum) {
  startNum = startNum || 1;
  return `<div class="terminal-titlebar">
    <span class="terminal-dot r"></span><span class="terminal-dot y"></span><span class="terminal-dot g"></span>
    <span class="terminal-title">edog deploy &mdash; sales_analytics_lh</span>
  </div><div class="terminal-body">${lines.map((l, i) =>
    `<div class="term-line ${l.c}" onclick="copyLine(this)" data-text="${esc(l.ts + ' ' + l.t)}"><span class="term-gutter">${startNum + i}</span><span class="term-content"><span class="term-ts">${l.ts}</span>${esc(l.t)}</span></div>`
  ).join('')}</div>`;
}

/* ── Deploy steps data ── */
const steps = [
  { label: 'Config',  icon: I.config },
  { label: 'Token',   icon: I.token },
  { label: 'Build',   icon: I.build },
  { label: 'Launch',  icon: I.launch },
  { label: 'Health',  icon: I.health },
];

function renderSteps(activeIdx, failedIdx) {
  return steps.map((s, i) => {
    let cls = 'pending';
    let icon = s.icon;
    if (failedIdx !== undefined && i === failedIdx) {
      cls = 'failed'; icon = I.x;
    } else if (i < activeIdx) {
      cls = 'done'; icon = I.check;
    } else if (i === activeIdx) {
      cls = 'active';
    }
    const connector = i < steps.length - 1 ? '<span class="step-connector"></span>' : '';
    return `<div class="deploy-step ${cls}">
      <div class="step-icon-wrap">${icon}</div>
      <span class="step-label">${s.label}</span>
      ${connector}
    </div>`;
  }).join('');
}

/* ── Ring Progress ── */
const RING_CIRC = 175.93; // 2 * PI * 28
function ringOffset(pct) { return RING_CIRC - (RING_CIRC * pct / 100); }

function renderRing(pct, gradientId) {
  gradientId = gradientId || 'ring-gradient';
  return `<div class="deploy-ring">
    <svg viewBox="0 0 64 64">
      <circle class="ring-bg" cx="32" cy="32" r="28"/>
      <circle class="ring-fill" cx="32" cy="32" r="28" stroke="url(#${gradientId})" style="stroke-dashoffset:${ringOffset(pct)}"/>
    </svg>
    <div class="ring-pct">${Math.round(pct)}%</div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════
   STATE RENDERERS
   ═══════════════════════════════════════════════════════ */

function setState(state) {
  currentState = state;
  terminalOpen = false;
  if (deployTimer) { clearInterval(deployTimer); deployTimer = null; }

  document.querySelectorAll('.state-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.state === state);
  });

  const shell = document.getElementById('app-shell');
  shell.className = 'app-shell state-' + state;

  const existingStale = document.querySelector('.stale-note');
  if (existingStale) existingStale.remove();

  switch (state) {
    case 'pre-deploy': renderPreDeploy(); break;
    case 'deploying': renderDeploying(); break;
    case 'deployed': renderDeployed(); break;
    case 'failed': renderFailed(); break;
    case 'stopped': renderStopped(); break;
  }
}

function renderPreDeploy() {
  const pill = document.getElementById('status-pill');
  pill.innerHTML = ''; pill.className = 'lh-status-pill hidden-pill';

  document.getElementById('actions-bar').innerHTML = `
    <div class="lh-actions-left">
      <button class="btn btn-primary" onclick="setState('deploying')">
        ${I.play} Deploy <span class="btn-kbd">Ctrl+D</span>
      </button>
    </div>
    <div class="lh-actions-right">
      <button class="btn btn-ghost">${I.ext} Open in Fabric</button>
      <button class="btn btn-ghost">${I.edit} Rename</button>
      <button class="btn btn-ghost">${I.copy} Clone</button>
    </div>`;

  document.getElementById('deploy-module').innerHTML = '';
}

function renderDeploying() {
  const pill = document.getElementById('status-pill');
  pill.className = 'lh-status-pill deploying';
  pill.innerHTML = '<span class="dot"></span> Deploying...';

  document.getElementById('actions-bar').innerHTML = `
    <div class="lh-actions-left">
      <button class="btn btn-deploying"><span class="spinner"></span> Deploying...</button>
    </div>
    <div class="lh-actions-right">
      <button class="btn btn-ghost">${I.ext} Open in Fabric</button>
    </div>`;

  deployElapsed = 0;
  deployStep = 0;
  const progressPcts = [12, 35, 60, 82, 100];

  function updateDeployUI() {
    const pct = progressPcts[Math.min(deployStep, 4)];
    const dm = document.getElementById('deploy-module');
    dm.innerHTML = `<div class="deploy-cinema slide-up">
      <div class="deploy-cinema-header">
        <span class="deploy-cinema-title"><span class="pulse-ring"></span> Deploying to sales_analytics_lh</span>
        <span class="deploy-timer">
          <span id="deploy-elapsed">${deployElapsed}s</span>
          <button class="deploy-cancel" onclick="setState('pre-deploy')">Cancel</button>
        </span>
      </div>
      <div class="deploy-ring-container">
        ${renderRing(pct)}
        <div class="deploy-steps">${renderSteps(deployStep)}</div>
      </div>
      <button class="deploy-terminal-toggle ${terminalOpen ? 'open' : ''}" onclick="toggleTerminal()">
        <span class="chevron">&#9656;</span> Build output
      </button>
      <div class="terminal-window ${terminalOpen ? 'open' : ''}" id="deploy-term">
        ${renderTerm(termLines.slice(0, Math.min((deployStep + 1) * 3, termLines.length)))}
      </div>
    </div>`;
  }

  updateDeployUI();

  deployTimer = setInterval(() => {
    deployElapsed++;
    if (deployElapsed % 4 === 0 && deployStep < 4) deployStep++;
    if (deployStep >= 5) {
      clearInterval(deployTimer); deployTimer = null;
      fireCompletionBurst();
      setTimeout(() => setState('deployed'), 400);
      return;
    }
    // Patch only changed parts
    const el = document.getElementById('deploy-elapsed');
    if (el) el.textContent = deployElapsed + 's';

    const ringFill = document.querySelector('.ring-fill');
    const ringPct = document.querySelector('.ring-pct');
    if (ringFill) {
      const pct = ((deployStep + 0.5) / steps.length) * 100;
      ringFill.style.strokeDashoffset = ringOffset(pct);
      if (ringPct) ringPct.textContent = Math.round(pct) + '%';
    }

    const termEl = document.getElementById('deploy-term');
    if (termEl && terminalOpen) {
      termEl.innerHTML = renderTerm(termLines.slice(0, Math.min((deployStep + 1) * 3, termLines.length)));
    }
  }, 1000);
}

function renderDeployed() {
  const pill = document.getElementById('status-pill');
  pill.className = 'lh-status-pill running';
  pill.innerHTML = `<span class="dot"></span> Running <span class="port-badge" id="port-badge"><span class="port-chars" id="port-text"></span></span>`;

}

function renderStopped() {

    const note = document.createElement('div');
    note.className = 'stale-note';
    note.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Table data may be stale &mdash; service is stopped`;
    card.insertBefore(note, card.firstChild);
  }
}

/* ═══════════════════════════════════════════════════════
   INTERACTIONS
   ═══════════════════════════════════════════════════════ */

/* ── Toggle terminal ── */
function toggleTerminal() {
  terminalOpen = !terminalOpen;
  const term = document.getElementById('deploy-term');
  if (term) term.classList.toggle('open', terminalOpen);
  const toggle = document.querySelector('.deploy-terminal-toggle');
  if (toggle) toggle.classList.toggle('open', terminalOpen);
  // Update chevron
  document.querySelectorAll('.deploy-summary .chevron, .deploy-terminal-toggle .chevron').forEach(c => {
    c.style.transform = terminalOpen ? 'rotate(90deg)' : '';
  });
}

/* ── Copy GUID with satisfaction ── */
function copyGuid() {
  const el = document.getElementById('guid-display');
  const hint = document.getElementById('copy-hint');
  if (navigator.clipboard) navigator.clipboard.writeText(FULL_GUID);
  el.classList.add('copied');
  hint.textContent = 'Copied!';
  showToast('GUID copied to clipboard', 'info');
  setTimeout(() => { el.classList.remove('copied'); hint.textContent = 'Click to copy'; }, 2000);
}

/* ── Copy terminal line ── */
function copyLine(el) {
  const text = el.dataset.text;
  if (navigator.clipboard && text) navigator.clipboard.writeText(text);
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 1200);
}

/* ── Theme toggle ── */
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.querySelector('.theme-icon').textContent = next === 'dark' ? '\u2600' : '\u263E';
}

/* ── Typewriter port reveal ── */
function typewriterPort(port) {
  const el = document.getElementById('port-text');
  const badge = document.getElementById('port-badge');
  if (!el || !badge) return;
  badge.classList.add('typing');
  let i = 0;
  const iv = setInterval(() => {
    if (i <= port.length) {
      el.textContent = port.slice(0, i);
      i++;
    } else {
      clearInterval(iv);
      badge.classList.remove('typing');
    }
  }, 80);
}

/* ── Toast notifications ── */
function showToast(msg, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  const iconSvg = type === 'success' ? I.check : type === 'error' ? I.x : I.check;
  toast.innerHTML = `<span class="toast-icon ${type}">${iconSvg}</span> ${esc(msg)}`;
  container.appendChild(toast);
  setTimeout(() => { toast.classList.add('toast-out'); setTimeout(() => toast.remove(), 300); }, 3000);
}

/* ── Completion burst particles ── */
function fireCompletionBurst() {
  const container = document.getElementById('burst-container');
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const colors = ['#6d5cff','#8577ff','#34d399','#a78bfa','#22c55e','#f0b429','#5b9bff'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'burst-particle';
    const angle = (Math.PI * 2 * i) / 40 + (Math.random() - 0.5) * 0.5;
    const dist = 80 + Math.random() * 180;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 60;
    p.style.cssText = `left:${cx}px;top:${cy}px;background:${colors[i % colors.length]};width:${3 + Math.random()*4}px;height:${3 + Math.random()*4}px;--dx:${dx}px;--dy:${dy}px;animation-duration:${0.6 + Math.random()*0.8}s;`;
    container.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

/* ── Table search filter ── */
document.getElementById('table-search').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase();
  let visible = 0;
  document.querySelectorAll('#tables-body tr').forEach(row => {
    const name = row.querySelector('.table-name')?.textContent.toLowerCase() || '';
    const show = name.includes(q);
    row.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  document.getElementById('table-count').textContent = visible;
});

/* ── Magnetic button hover ── */
document.addEventListener('mousemove', function(e) {
  const btns = document.querySelectorAll('.btn');
  btns.forEach(btn => {
    const rect = btn.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    btn.style.setProperty('--mouse-x', x + '%');
    btn.style.setProperty('--mouse-y', y + '%');
  });
});

/* ── Initialize ── */
renderTables();
setState('pre-deploy');
</script>
